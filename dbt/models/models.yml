version: 2
models:
  - name: silver_customers
    columns:
      - name: customer_id
        tests: [not_null, unique]
      - name: country
        tests: [not_null]
  
  - name: silver_payments
    columns:
      - name: payment_id
        tests: [not_null, unique]
      - name: status
        tests:
          - accepted_values:
              values: [succeeded, failed, refunded]

  - name: silver_sessions
    columns:
      - name: session_id
        tests: [not_null, unique]
      - name: source
        tests:
          - accepted_values:
              values: [google, direct, facebook, linkedin, newsletter, referral, x]
  
  - name: fact_daily_revenue
    columns:
      - name: order_day
        tests: [not_null]
  
  - name: fact_marketing_attribution
    columns:
      - name: session_day
        tests: [not_null]